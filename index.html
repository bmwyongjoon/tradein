<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1c3d6e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="트레이드인 진단">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>트레이드인 진단</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  :root {
    --bmw-blue: #1c3d6e;
    --bmw-light: #eef2f8;
    --bmw-mid: #4a6fa8;
    --mini-black: #111111;
    --mini-light: #f2f2f2;
    --mini-mid: #555555;
    --primary: #1c3d6e;
    --primary-light: #eef2f8;
    --primary-mid: #4a6fa8;
    --white: #ffffff;
    --gray-100: #f7f8fa;
    --gray-200: #e8eaed;
    --gray-400: #9aa0a9;
    --gray-600: #5f6368;
    --gray-900: #1a1a2e;
    --success: #2e7d32;
    --success-light: #e8f5e9;
    --danger: #c62828;
    --danger-light: #ffebee;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--gray-100);
    color: var(--gray-900);
    min-height: 100vh;
    min-height: 100dvh;
    overscroll-behavior: none;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; min-height: 100vh; min-height: 100dvh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ===== BRAND SELECT ===== */
  #screen-brand {
    background: var(--white);
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
  }
  .brand-logo-area { text-align: center; margin-bottom: 48px; }
  .brand-logo-area h1 { font-size: 13px; font-weight: 500; color: var(--gray-400); letter-spacing: 2px; margin-bottom: 6px; }
  .brand-logo-area p { font-size: 22px; font-weight: 700; color: var(--gray-900); }
  .brand-cards { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 360px; }
  .brand-card {
    border-radius: var(--radius);
    padding: 28px 24px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }
  .brand-card:active { transform: scale(0.98); }
  .brand-card.bmw { background: var(--bmw-blue); }
  .brand-card.mini { background: var(--mini-black); }
  .brand-card-label { font-size: 11px; font-weight: 500; letter-spacing: 2px; opacity: 0.6; color: #fff; margin-bottom: 6px; }
  .brand-card-name { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .brand-card-sub { font-size: 13px; color: rgba(255,255,255,0.6); }
  .brand-card-arrow { position: absolute; right: 24px; top: 50%; transform: translateY(-50%); font-size: 20px; color: rgba(255,255,255,0.4); }
  .brand-contact { margin-top: 36px; text-align: center; }
  .brand-contact p { font-size: 12px; color: var(--gray-400); line-height: 1.6; }

  /* ===== HEADER ===== */
  .app-header {
    padding: 52px 20px 16px;
    flex-shrink: 0;
  }
  .app-header.bmw { background: var(--bmw-blue); }
  .app-header.mini { background: var(--mini-black); }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .header-brand { font-size: 12px; font-weight: 500; letter-spacing: 2px; color: rgba(255,255,255,0.7); }
  .header-back { font-size: 13px; color: rgba(255,255,255,0.7); cursor: pointer; padding: 4px 0; }
  .header-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 16px; }
  .progress-bar { height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; }
  .progress-fill { height: 3px; border-radius: 2px; background: #fff; transition: width 0.3s ease; }
  .progress-text { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 6px; }

  /* ===== BODY ===== */
  .app-body {
    flex: 1;
    padding: 20px 20px 32px;
    overflow-y: auto;
  }

  /* ===== QUESTION ===== */
  .question-label { font-size: 12px; font-weight: 500; letter-spacing: 1px; color: var(--gray-400); margin-bottom: 10px; }
  .question-text { font-size: 18px; font-weight: 700; color: var(--gray-900); line-height: 1.4; margin-bottom: 6px; }
  .question-hint { font-size: 13px; color: var(--gray-600); margin-bottom: 20px; line-height: 1.5; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--white);
  }
  .option:active { transform: scale(0.99); }
  .option.selected.bmw { border-color: var(--bmw-blue); background: var(--bmw-light); }
  .option.selected.mini { border-color: var(--mini-black); background: var(--mini-light); }
  .option-radio {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid var(--gray-200);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .option.selected.bmw .option-radio { border-color: var(--bmw-blue); background: var(--bmw-blue); }
  .option.selected.mini .option-radio { border-color: var(--mini-black); background: var(--mini-black); }
  .option-radio::after {
    content: ''; width: 8px; height: 8px; border-radius: 50%; background: #fff;
    opacity: 0; transition: opacity 0.15s;
  }
  .option.selected .option-radio::after { opacity: 1; }
  .option-text { font-size: 14px; color: var(--gray-900); line-height: 1.4; }
  .option.selected .option-text { font-weight: 500; }

  /* ===== BUTTONS ===== */
  .btn-primary {
    width: 100%; padding: 15px;
    border: none; border-radius: var(--radius);
    font-size: 15px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; transition: all 0.15s;
    margin-top: 20px;
  }
  .btn-primary:active { transform: scale(0.99); }
  .btn-primary.bmw { background: var(--bmw-blue); color: #fff; }
  .btn-primary.mini { background: var(--mini-black); color: #fff; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ===== RESULT ===== */
  .result-card {
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    text-align: center;
  }
  .result-card.possible { background: var(--success-light); border: 1.5px solid #a5d6a7; }
  .result-card.impossible { background: var(--danger-light); border: 1.5px solid #ef9a9a; }
  .result-icon { font-size: 36px; margin-bottom: 10px; }
  .result-promo-name { font-size: 12px; font-weight: 500; letter-spacing: 1px; margin-bottom: 6px; }
  .result-promo-name.possible { color: var(--success); }
  .result-promo-name.impossible { color: var(--danger); }
  .result-percent { font-size: 52px; font-weight: 700; line-height: 1; }
  .result-percent.possible { color: var(--success); }
  .result-percent.impossible { color: var(--danger); font-size: 24px; margin-top: 8px; }
  .result-desc { font-size: 13px; color: var(--gray-600); margin-top: 8px; line-height: 1.6; }

  .contact-section { margin-bottom: 16px; }
  .contact-label { font-size: 12px; font-weight: 500; letter-spacing: 1px; color: var(--gray-400); margin-bottom: 10px; }
  .contact-buttons { display: flex; gap: 8px; }
  .contact-btn {
    flex: 1; padding: 13px 8px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--gray-200);
    background: var(--white);
    cursor: pointer; transition: all 0.15s;
    display: flex; flex-direction: column;
    align-items: center; gap: 5px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .contact-btn:active { transform: scale(0.97); }
  .contact-btn-icon { font-size: 20px; }
  .contact-btn-text { font-size: 12px; font-weight: 500; color: var(--gray-900); }

  /* ===== DOCUMENT ===== */
  .doc-toggle {
    width: 100%; padding: 14px 16px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    background: var(--white);
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; margin-bottom: 10px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .doc-toggle-left { display: flex; align-items: center; gap: 10px; }
  .doc-toggle-icon { font-size: 16px; }
  .doc-toggle-text { font-size: 14px; font-weight: 500; color: var(--gray-900); }
  .doc-toggle-arrow { font-size: 12px; color: var(--gray-400); transition: transform 0.2s; }
  .doc-toggle.open .doc-toggle-arrow { transform: rotate(180deg); }

  .doc-content {
    display: none;
    background: var(--white);
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    margin-top: -6px;
  }
  .doc-content.open { display: block; }

  .doc-section { margin-bottom: 16px; }
  .doc-section:last-child { margin-bottom: 0; }
  .doc-section-title {
    font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
    color: var(--gray-400); margin-bottom: 8px;
    padding-bottom: 6px; border-bottom: 1px solid var(--gray-200);
  }
  .doc-item { font-size: 13px; color: var(--gray-900); line-height: 1.7; padding-left: 12px; position: relative; }
  .doc-item::before { content: '·'; position: absolute; left: 2px; color: var(--gray-400); }
  .doc-note { font-size: 12px; color: var(--gray-600); line-height: 1.6; margin-top: 8px; padding: 10px; background: var(--gray-100); border-radius: var(--radius-sm); }
  .doc-highlight { background: #fff9c4; border-radius: 3px; padding: 0 3px; font-weight: 500; }

  .btn-reset {
    width: 100%; padding: 13px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    background: var(--white);
    font-size: 14px; font-weight: 500; color: var(--gray-600);
    cursor: pointer; margin-top: 6px;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .btn-reset:active { background: var(--gray-100); }
</style>
</head>

// ===== RESULT =====
const RESULT_CODES = ['__result_3__', '__result_2__', '__result_1__', '__confirm__', '__impossible__', '__quote__'];

function getResultFromFlow(flow) {
  const last = flow[flow.length - 1];
  if (RESULT_CODES.includes(last)) return last;
  return null;
}

function calcResult() {
  const flow = currentBrand === 'bmw' ? buildBmwFlow() : buildMiniFlow();
  const last = flow[flow.length - 1];
  const brand = currentBrand === 'bmw' ? answers.car_brand : answers.mini_car_brand;

  if (last === '__result_3__') {
    const promo = (currentBrand === 'bmw' && brand === 'bmw') ? 'Ride Again' : 'Trade-in';
    const note = (currentBrand === 'bmw' && brand === 'bmw')
      ? '7년 이내 Trade-in / 7년 초과 Ride Again\nex) 2018년 최초등록차량 2026년 구차매각 → Trade-in / 2017년 최초등록차량 2026년 구차매각 → Ride Again'
      : currentBrand === 'mini' ? 'MINI/BMW 구차 · MINI 신차' : '전략차종 → 7시리즈 구매';
    return { possible: true, promo, percent: 3, note };
  }
  if (last === '__result_2__') {
    const promo = currentBrand === 'mini' ? 'MINI Next' : 'Trade-in';
    return { possible: true, promo, percent: 2, note: '' };
  }
  if (last === '__result_1__') {
    return { possible: true, promo: 'Trade-in', percent: 1, note: '' };
  }
  if (last === '__confirm__') {
    return { possible: null, reason: '명의와 관련하여 좀 더 정확한 확인이 필요합니다.\n아래 연락처로 연락 부탁드립니다.' };
  }
  if (last === '__impossible__') {
    return { possible: false, reason: '트레이드인이 불가능합니다.\n추가로 궁금하신 사항은 아래 연락처로 연락 부탁드립니다.' };
  }
  if (last === '__quote__') {
    return { possible: 'quote' };
  }
  return { possible: false, reason: '조건을 확인할 수 없습니다.' };
}

// ===== NAVIGATION =====
function selectBrand(brand) {
  currentBrand = brand;
  answers = {};
  flowIndex = 0;

  const color = brand === 'bmw' ? 'bmw' : 'mini';
  document.getElementById('diag-header').className = `app-header ${color}`;
  document.getElementById('result-header').className = `app-header ${color}`;
  document.getElementById('btn-next').className = `btn-primary ${color}`;
  document.getElementById('diag-brand-label').textContent = brand === 'bmw' ? 'BMW TRADE-IN / RIDE AGAIN' : 'MINI NEXT';
  document.getElementById('result-brand-label').textContent = brand === 'bmw' ? 'BMW TRADE-IN / RIDE AGAIN' : 'MINI NEXT';

  showScreen('screen-diagnosis');
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goBack() {
  answers = {};
  flowIndex = 0;
  showScreen('screen-brand');
}

// ===== QUESTION RENDER =====
function getFlow() {
  return currentBrand === 'bmw' ? buildBmwFlow() : buildMiniFlow();
}

function renderQuestion() {
  const flow = getFlow();
  const qId = flow[flowIndex];

  // 결과 코드에 도달하면 결과 화면으로
  if (!qId || RESULT_CODES.includes(qId)) {
    showResult();
    return;
  }

  const qDef = allQuestions[qId];
  if (!qDef) { showResult(); return; }

  // 프로그레스: 결과 직전 질문 기준
  const questionSteps = flow.filter(f => !RESULT_CODES.includes(f));
  const total = questionSteps.length;
  const current = flowIndex + 1;
  const pct = total > 1 ? (flowIndex / (total - 1)) * 100 : 100;

  document.getElementById('q-label').textContent = `STEP ${current}`;
  document.getElementById('q-text').textContent = qDef.text;
  document.getElementById('q-hint').textContent = qDef.hint || '';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${current} / ${total}`;

  const optContainer = document.getElementById('q-options');
  optContainer.innerHTML = '';
  const colorClass = currentBrand === 'bmw' ? 'bmw' : 'mini';

  qDef.options.forEach(opt => {
    const div = document.createElement('div');
    div.className = 'option' + (answers[qId] === opt.value ? ` selected ${colorClass}` : '');
    div.innerHTML = `
      <div class="option-radio"></div>
      <div class="option-text">${opt.label}${opt.sub ? `<br><span style="font-size:12px;color:var(--gray-400)">${opt.sub}</span>` : ''}</div>
    `;
    div.onclick = (e) => selectOption(e, qId, opt.value, colorClass);
    optContainer.appendChild(div);
  });

  document.getElementById('btn-next').disabled = !answers[qId];
}

function selectOption(e, qId, value, colorClass) {
  answers[qId] = value;
  document.querySelectorAll('.option').forEach(o => { o.className = 'option'; });
  e.currentTarget.className = `option selected ${colorClass}`;
  document.getElementById('btn-next').disabled = false;
}

function nextStep() {
  flowIndex++;
  const flow = getFlow();
  const qId = flow[flowIndex];
  if (!qId || RESULT_CODES.includes(qId)) {
    showResult();
  } else {
    renderQuestion();
  }
}

// ===== RESULT =====
function showResult() {
  const result = calcResult();
  const body = document.getElementById('result-body');
  const colorClass = currentBrand === 'bmw' ? 'bmw' : 'mini';
  let html = '';

  if (result.possible === true) {
    html += `
      <div class="result-card possible">
        <div class="result-icon">✓</div>
        <div class="result-promo-name possible">${result.promo}</div>
        <div class="result-percent possible">${result.percent}%</div>
        <div class="result-desc">신차 MSRP 기준 트레이드인 지원금</div>
        ${result.note ? `<div class="result-desc" style="margin-top:6px;font-size:12px;color:var(--gray-400);white-space:pre-line">${result.note}</div>` : ''}
      </div>
    `;
  } else if (result.possible === null) {
    html += `
      <div class="result-card" style="background:#fff9e6;border:1.5px solid #ffe082;text-align:center;padding:24px;border-radius:var(--radius);margin-bottom:16px;">
        <div class="result-icon">!</div>
        <div style="font-size:15px;font-weight:700;color:#b8860b;margin-bottom:8px">명의 관련 확인 필요</div>
        <div style="font-size:13px;color:var(--gray-600);line-height:1.6;white-space:pre-line">${result.reason}</div>
      </div>
    `;
  } else if (result.possible === 'quote') {
    html += `
      <div class="result-card possible" style="text-align:center">
        <div class="result-icon">📋</div>
        <div style="font-size:16px;font-weight:700;color:var(--success);margin-bottom:8px">차량 견적 문의</div>
        <div style="font-size:13px;color:var(--gray-600)">아래 연락처로 차량 정보를 보내주시면<br>기준 매입가를 안내드립니다.</div>
      </div>
    `;
  } else {
    html += `
      <div class="result-card impossible">
        <div class="result-icon">✗</div>
        <div class="result-promo-name impossible">트레이드인 불가</div>
        <div class="result-percent impossible" style="font-size:14px;line-height:1.6;white-space:pre-line">${result.reason}</div>
      </div>
    `;
  }

  // 문의 버튼
  const smsBody = encodeURIComponent('안녕하세요! 트레이드인 문의드립니다.\n차종: \n연식: \n주행거리: ');
  html += `
    <div class="contact-section">
      <div class="contact-label">문의하기</div>
      <div class="contact-buttons">
        <button class="contact-btn" onclick="window.location.href='tel:01033843507'">
          <span class="contact-btn-icon">📞</span>
          <span class="contact-btn-text">전화</span>
        </button>
        <button class="contact-btn" onclick="window.location.href='sms:01033843507?body=${smsBody}'">
          <span class="contact-btn-icon">💬</span>
          <span class="contact-btn-text">문자</span>
        </button>
        <button class="contact-btn" onclick="window.open('https://open.kakao.com/o/sVJ7zkGf','_blank')">
          <span class="contact-btn-icon">🟡</span>
          <span class="contact-btn-text">카카오톡</span>
        </button>
      </div>
    </div>
  `;

  // 서류 안내 (불가 제외하고 표시)
  if (result.possible !== false) {
    html += `<div class="contact-label" style="margin-bottom:10px">필요 서류 안내</div>`;
    ['lease_personal_biz', 'lease_personal', 'cash_corporate'].forEach(key => {
      const doc = docData[key];
      html += `
        <button class="doc-toggle" onclick="toggleDoc('${key}', this)">
          <div class="doc-toggle-left">
            <span class="doc-toggle-icon">📋</span>
            <span class="doc-toggle-text">${doc.title}</span>
          </div>
          <span class="doc-toggle-arrow">▼</span>
        </button>
        <div class="doc-content" id="doc-${key}">
      `;
      doc.sections.forEach(sec => {
        html += `<div class="doc-section"><div class="doc-section-title">${sec.title}</div>`;
        sec.items.forEach(item => { html += `<div class="doc-item">${item}</div>`; });
        if (sec.note) html += `<div class="doc-note">${sec.note}</div>`;
        html += `</div>`;
      });
      html += `</div>`;
    });
  }

  html += `<button class="btn-reset" onclick="resetDiagnosis()">← 다시 진단하기</button>`;

  body.innerHTML = html;
  showScreen('screen-result');
  window.scrollTo(0, 0);
}

function toggleDoc(key, btn) {
  const content = document.getElementById(`doc-${key}`);
  const isOpen = content.classList.contains('open');
  content.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
}

function resetDiagnosis() {
  answers = {};
  flowIndex = 0;
  showScreen('screen-diagnosis');
  renderQuestion();
}
